# Alertmanager configuration
# Receives alerts from Prometheus and routes them to receivers.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s
    - match:
        severity: warning
      receiver: 'default'

receivers:
  - name: 'default'
    webhook_configs: []

  - name: 'critical'
    webhook_configs: []

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
