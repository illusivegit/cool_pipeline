services:
  # ── Layer 1: Storage & Collection ─────────────────────────────────────────
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./otel-collector/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./otel-collector/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./otel-collector/recording-rules.yml:/etc/prometheus/recording-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    cap_drop:
      - ALL
    networks:
      - observability

  tempo:
    image: ${TEMPO_IMAGE}
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./otel-collector/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "4317"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    cap_drop:
      - ALL
    networks:
      - observability

  loki:
    image: ${LOKI_IMAGE}
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./otel-collector/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    cap_drop:
      - ALL
    networks:
      - observability

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    environment:
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:8080}
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "8888:8888"
      - "8889:8889"
      - "13133:13133"
    depends_on:
      - tempo
      - loki
      - prometheus
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    cap_drop:
      - ALL
    networks:
      - backend-net
      - observability

  alertmanager:
    image: ${ALERTMANAGER_IMAGE}
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./otel-collector/.alertmanager-rendered.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    cap_drop:
      - ALL
    networks:
      - observability

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    pid: host
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    cap_drop:
      - ALL
    networks:
      - observability

  # ── Layer 2: Application ──────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: flask-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - OTEL_SERVICE_NAME=flask-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_RESOURCE_ATTRIBUTES=service.name=flask-backend,service.version=1.0.0,deployment.environment=${ENVIRONMENT:-reference}
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/metrics', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      - otel-collector
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    cap_drop:
      - ALL
    networks:
      - backend-net
      - observability

  # ── Layer 3: Frontend ─────────────────────────────────────────────────────
  frontend:
    image: ${NGINX_IMAGE}
    container_name: frontend
    # Replace nginx's default stdout/stderr symlinks with real log files for Promtail
    command: ["/bin/sh", "-c", "rm -f /var/log/nginx/access.log /var/log/nginx/error.log && exec nginx -g 'daemon off;'"]
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - frontend-net
      - backend-net

  nginx-exporter:
    image: ${NGINX_EXPORTER_IMAGE}
    container_name: nginx-exporter
    command:
      - '--nginx.scrape-uri=http://frontend:80/stub_status'
    ports:
      - "9113:9113"
    depends_on:
      - frontend
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M
    cap_drop:
      - ALL
    networks:
      - frontend-net
      - observability

  promtail:
    image: ${PROMTAIL_IMAGE}
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./otel-collector/promtail-config.yml:/etc/promtail/config.yml:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      - loki
      - frontend
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    cap_drop:
      - ALL
    networks:
      - observability

  # ── Layer 4: Visualization ────────────────────────────────────────────────
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki
      - alertmanager
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    cap_drop:
      - ALL
    networks:
      - frontend-net
      - observability

  cadvisor:
    image: ${CADVISOR_IMAGE}
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - observability

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  observability:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  backend-data:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  nginx-logs:
