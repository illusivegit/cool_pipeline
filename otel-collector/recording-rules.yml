groups:
  - name: flask_backend_recording
    interval: 15s
    rules:
      # Request rate (5m window)
      - record: job:http_requests_total:rate5m
        expr: rate(http_requests_total[5m])

      # Error rate (5xx responses, 5m window)
      - record: job:http_requests_errors:rate5m
        expr: rate(http_requests_total{status_code=~"5.."}[5m])

      # Average request duration (5m window)
      - record: job:http_request_duration_seconds:avg5m
        expr: |
          rate(http_request_duration_seconds_sum[5m])
          /
          rate(http_request_duration_seconds_count[5m])

      # P95 request duration
      - record: job:http_request_duration_seconds:p95
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          )

      # P99 request duration
      - record: job:http_request_duration_seconds:p99
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])
          )

  - name: infrastructure_recording
    interval: 15s
    rules:
      # Host CPU usage percentage
      - record: instance:node_cpu_usage:percent
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      # Host memory usage percentage
      - record: instance:node_memory_usage:percent
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100

      # Host disk usage percentage (root partition)
      - record: instance:node_disk_usage:percent
        expr: |
          (1 - node_filesystem_avail_bytes{mountpoint=~"/|/var/lib",fstype=~"ext4|xfs|btrfs"}
             / node_filesystem_size_bytes{mountpoint=~"/|/var/lib",fstype=~"ext4|xfs|btrfs"}) * 100
