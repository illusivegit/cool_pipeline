groups:
  - name: application
    rules:
      - alert: BackendDown
        expr: up{job="flask-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Flask backend is down"
          description: "The flask-backend target has been unreachable for over 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[5m]))
            /
            clamp_min(sum(rate(http_requests_total{endpoint!="metrics"}[5m])), 1e-10)
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx error rate above 5%"
          description: "{{ $value | humanizePercentage }} of requests returning 5xx."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{endpoint!="metrics"}[2m])) by (le)
          ) > 0.5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High P95 request latency"
          description: "95th percentile request latency exceeds 500ms."

  - name: infrastructure
    rules:
      - alert: HostHighCpuUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage above 85%"
          description: "CPU usage on {{ $labels.instance }} has been above 85% for 5 minutes."

      - alert: HostHighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage above 85%"
          description: "Memory usage on {{ $labels.instance }} has been above 85% for 5 minutes."

      - alert: HostDiskSpaceWarning
        expr: |
          (1 - node_filesystem_avail_bytes{mountpoint=~"/|/var/lib",fstype=~"ext4|xfs|btrfs"}
             / node_filesystem_size_bytes{mountpoint=~"/|/var/lib",fstype=~"ext4|xfs|btrfs"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage above 80%"
          description: "Disk usage on {{ $labels.instance }} root partition exceeds 80%."

  - name: observability-stack
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Target {{ $labels.instance }} in job {{ $labels.job }} has been down for 2 minutes."

      - alert: OtelCollectorDroppedSpans
        expr: rate(otelcol_exporter_send_failed_spans[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector dropping spans"
          description: "The OTel Collector is failing to export spans to Tempo."

  - name: slo
    rules:
      - alert: HighAvailabilityBurnRate
        expr: |
          (
            sum(rate(http_errors_total[5m]))
            /
            clamp_min(sum(rate(http_requests_total{endpoint!="metrics"}[5m])), 1e-10)
          ) > 14.4 * (1 - 0.99)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Availability SLO burn rate is critical"
          description: "Error rate is burning through the 99% availability SLO at 14.4x the sustainable rate."

  - name: storage
    rules:
      - alert: PrometheusTSDBHighDiskUsage
        expr: |
          (prometheus_tsdb_storage_blocks_bytes + prometheus_tsdb_wal_storage_size_bytes)
          / (1024 * 1024 * 1024) > 4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB using more than 4GB disk"
          description: "Prometheus storage is at {{ $value | humanize }}GB."

      - alert: HostDiskWillFillIn24h
        expr: |
          predict_linear(node_filesystem_avail_bytes{mountpoint="/",fstype=~"ext4|xfs|btrfs"}[6h], 24*3600) < 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host disk predicted to fill within 24 hours"
          description: "Based on 6h trend, root filesystem will be full in <24h."

  - name: collector-health
    rules:
      - alert: OtelCollectorHighMemory
        expr: |
          otelcol_process_memory_rss > 400 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector using >400MB RSS (limit: 512MB)"
          description: "Approaching 512MB memory limit. May start dropping data."

      - alert: LokiIngestionErrors
        expr: |
          sum(rate(loki_request_duration_seconds_count{method="POST",route="loki_api_v1_push",status_code=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki is returning 5xx on log push"
          description: "Logs may be lost."

      - alert: PrometheusScrapeSlow
        expr: |
          scrape_duration_seconds > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus scrape >10s for {{ $labels.job }}"
          description: "Slow scrapes may indicate unhealthy target."
