global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'otel-lab'
    environment: 'reference'

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule files
rule_files:
  - /etc/prometheus/alert-rules.yml
  - /etc/prometheus/recording-rules.yml

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Scrape Flask backend metrics
  - job_name: 'flask-backend'
    honor_labels: true
    static_configs:
      - targets: ['backend:5000']

  # Scrape Tempo metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Scrape Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Scrape Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Scrape Node Exporter (host metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Scrape Alertmanager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Scrape Nginx edge metrics (stub_status via exporter sidecar)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # Scrape container metrics (cAdvisor)
  - job_name: 'cadvisor'
    honor_timestamps: false
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Keep only the container metrics we need
      - source_labels: [__name__]
        regex: container_(cpu_usage_seconds_total|memory_usage_bytes|memory_working_set_bytes|spec_memory_limit_bytes|network_receive_bytes_total|network_transmit_bytes_total|fs_usage_bytes|fs_limit_bytes|spec_cpu_quota|spec_cpu_period)
        action: keep
      # Drop non-Docker cgroups (keep / for network, /docker and /docker/*)
      - source_labels: [id]
        regex: /kubepods.*|/podruntime.*|/procd-paused|/restricted
        action: drop
