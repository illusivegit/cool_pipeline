# Rate limiting for OTLP trace ingestion (10 req/s per IP, burst up to 20)
limit_req_zone $binary_remote_addr zone=traces:1m rate=10r/s;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Write access and error logs to shared volume for Promtail
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # Docker's embedded DNS server - enables dynamic service discovery
  # valid=30s: re-resolve every 30 seconds (Docker default TTL)
  # ipv6=off: disable IPv6 resolution (optional, for clarity)
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Serve static files
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Prometheus metrics: Nginx stub_status (internal only)
  location /stub_status {
      stub_status;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      allow 10.0.0.0/8;
      deny all;
  }

  # Proxy OTLP traces to OTel Collector (rate-limited)
  location /v1/traces {
    limit_req zone=traces burst=20 nodelay;
    limit_req_status 429;

    set $collector_upstream http://otel-collector:4318;
    proxy_pass $collector_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Content-Type $content_type;

    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }

  # Proxy API to Flask backend via Docker DNS
  location /api/ {
    # Handle CORS preflight
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;
      add_header Access-Control-Allow-Headers *;
      return 204;
    }

    # Variable triggers per-request DNS re-resolution (not cached at startup)
    set $backend_upstream http://backend:5000;
    proxy_pass $backend_upstream;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for better error visibility
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;

    # CORS headers on proxied responses
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;
    add_header Access-Control-Allow-Headers *;
  }
}
